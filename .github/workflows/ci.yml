name: CI / Testing

# This workflow will trigger on pushes and pull requests to the main/master branches
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: Run Tests on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    # We test on multiple Node versions to ensure maximum compatibility
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      # 1. Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up the Node.js environment
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm' # Caches dependencies to speed up future runs

      # 3. Install dependencies (npm ci is faster and stricter than npm install for CI)
      - name: Install dependencies
        run: npm ci

      # 4. Run the Jest test suite
      - name: Run tests
        run: npm test

      # 5. Ensure the TypeScript compiles successfully to legacy JS
      - name: Build package
        run: npm run build